[data]
raw_path       = "data/raw/Flight_Price_Dataset_of_Bangladesh.csv"
processed_path = "data/processed/Flight_Price_Dataset_of_Bangladesh.parquet"
features_dir   = "data/features"
test_size      = 0.2
val_size       = 0.1
random_state   = 42

[cleaning]
missingness_drop_threshold  = 0.5
numerical_impute_strategy   = "median"
categorical_impute_value    = "Unknown"
leakage_columns             = ["Base Fare (BDT)", "Tax & Surcharge (BDT)"]

[features]
target          = "fare"
log_target      = true
eval_log_space  = true
redundant   = ["source_name", "destination_name"]
categorical = [
    "airline", "source", "destination",
    "aircraft_type", "travel_class", "booking_source", "seasonality",
]
numerical   = [
    "duration", "days_left", "stopovers",
    "departure_hour", "departure_day_of_week", "departure_month",
    "arrival_hour",   "arrival_day_of_week",   "arrival_month",
]
log_numerics      = true
log_numeric_cols  = ["duration", "days_left"]
target_encode_cols = ["route"]

[features.ordinal]
stopovers = ["Direct", "1 Stop", "2 Stops"]

[models.linear_regression]
# no hyperparameters

[models.ridge]
alpha = [0.1, 1.0, 10.0, 100.0]

[models.lasso]
alpha      = [0.01, 0.1, 1.0, 10.0]
max_iter   = 5_000

[models.decision_tree]
max_depth        = [3, 5, 10, 15, 20]
min_samples_split = [2, 5, 10]
min_samples_leaf  = [1, 2, 4]
random_state     = 42

[models.random_forest]
n_estimators = 200
max_depth    = 15
random_state = 42

[models.gradient_boosting]
n_estimators  = 300
learning_rate = 0.05
max_depth     = 6
random_state  = 42

[models.xgboost]
n_estimators     = 500
learning_rate    = 0.03
max_depth        = 7
subsample        = 0.8
colsample_bytree = 0.8
random_state     = 42

[eda]
group_cols         = ["airline", "source", "destination", "seasonality"]
correlation_method = "pearson"

[evaluation]
cv_folds = 5
scoring  = "neg_root_mean_squared_error"
metrics  = ["rmse", "mae", "r2", "mape"]

[tuning]
n_trials   = 100
timeout    = 3600
study_name = "flight_fare_optuna"

[mlflow]
enabled       = true
tracking_uri  = "sqlite:///mlflow.db"
artifact_location = "mlartifacts"
registry_name = "FarePredictor"
